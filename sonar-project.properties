# Project identification
sonar.projectKey=learn-jenkins-app
sonar.projectName=Learn Jenkins App
sonar.projectVersion=0.1.0

# Source and tests
sonar.sources=src
sonar.tests=src,e2e,tests-examples
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/public/**,**/playwright-report/**,**/jest-results/**,**/test-results/**
sonar.coverage.exclusions=**/*.test.js,**/*.spec.js,src/index.js,src/reportWebVitals.js,src/setupTests.js

# Test and coverage reports (generated by npm test / CI coverage)
sonar.junit.reportPaths=jest-results/junit.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info
